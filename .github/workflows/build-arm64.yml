name: Build arm64

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-arm64-alpine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build static arm64 binary
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/workspace -w /workspace alpine:3.18 /bin/sh -c "
            set -ex
            apk update
            apk add build-base pkgconf autoconf automake libtool openssl-dev openssl-libs-static zlib-static linux-headers curl ca-certificates tar
            
            # 静态编译 libconfuse
            curl -LO https://github.com/martinh/libconfuse/releases/download/v3.3/confuse-3.3.tar.gz
            tar xzf confuse-3.3.tar.gz
            cd confuse-3.3
            ./configure --enable-static --disable-shared
            make -j4
            make install
            cd ..
            
            # 静态编译 inadyn
            ./autogen.sh
            
            export ac_cv_header_openssl_crypto_h=yes
            export ac_cv_header_openssl_x509_h=yes
            export ac_cv_header_openssl_pem_h=yes
            export ac_cv_header_openssl_ssl_h=yes
            export ac_cv_header_openssl_tls1_h=yes
            export ac_cv_header_openssl_err_h=yes
            export PKG_CONFIG='pkgconf --static'
            
            ./configure --enable-openssl --enable-reduced CFLAGS='-Os' LDFLAGS='-static -s' PKG_CONFIG_PATH='/usr/local/lib/pkgconfig'
            make -j4 V=1
            
            mkdir -p output
            cp src/inadyn output/
          "
            
      - uses: actions/upload-artifact@v4
        with:
          name: inadyn-arm64-static
          path: output/inadyn
          
      - name: Generate Release Info
        run: |
          date_str=$(date '+%Y%m%d-%H%M')
          echo "RELEASE_TAG=asus-merlin-inadyn-${date_str}" >> $GITHUB_ENV
          echo "RELEASE_NAME=inadyn arm64 static ${date_str}" >> $GITHUB_ENV
          
      - name: Publish GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.RELEASE_TAG }}
          overwrite: true
          file: output/inadyn
          asset_name: inadyn-arm64
          body: |
            ASUSWRT-Merlin / inadyn statically compiled for arm64.
            
            Build time: `${{ env.RELEASE_TAG }}`
            
            Compiled via GitHub Actions with:
            \`--enable-openssl --enable-reduced CFLAGS="-Os" LDFLAGS="-static -s"\`
