name: Build arm64

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build-arm64-alpine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: uraimo/run-on-arch-action@v2
        name: Build static arm64 binary
        with:
          arch: aarch64
          distro: alpine_latest
          run: |
            set -ex
            apk update
            # openssl-libs-static may not exist in some alpine versions, openssl-dev is usually enough
            apk add build-base pkgconf autoconf automake libtool openssl-dev linux-headers curl ca-certificates tar
            
            # Build libconfuse statically (use curl and tar.gz to avoid missing xz/wget TLS issues)
            curl -LO https://github.com/martinh/libconfuse/releases/download/v3.3/confuse-3.3.tar.gz
            tar xzf confuse-3.3.tar.gz
            cd confuse-3.3
            ./configure --enable-static --disable-shared
            make -j4
            make install
            cd ..
            
            # Build inadyn statically
            ./autogen.sh
            export PKG_CONFIG="pkgconf --static"
            ./configure --enable-openssl --enable-reduced CFLAGS="-Os" LDFLAGS="-static -s" PKG_CONFIG_PATH="/usr/local/lib/pkgconfig"
            
            # Output build log for debugging if it fails
            make -j4 V=1
            
            mkdir -p output
            cp src/inadyn output/
            
      - uses: actions/upload-artifact@v4
        with:
          name: inadyn-arm64-static
          path: output/inadyn
